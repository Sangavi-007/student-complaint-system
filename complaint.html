<!DOCTYPE html>
<html>
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial-scale = 1.0">
    <title>Submit Complaint</title>
    <style>
textarea {
    min-height: 90px;
}
*{
    box-sizing: border-box;
}
body {
    background: #eef2f7;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}
 .background{
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url("clg.jpeg") no-repeat center/cover;
        filter: blur(5px);  
        z-index: -1;
 }

.container {
    width: 450px;
    margin: auto;
    margin-top: 80px;
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    font-family: Arial, sans-serif;
}


input:focus, select:focus, textarea:focus {
    border-color: #007bff;
    outline: none;
}
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(to right,  #6a11cb, #2575fc);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: linear-gradient(to right, #0052cc, #00aaff);
}
#ad{
    text-decoration: none;
    color: aliceblue;
}
    </style>
</head>
<body>
<div class = "background"></div>
<div class="container">
    <h2>Query details</h2>

    <form onsubmit="return saveComplaint()">
        <label>Complaint type:</label>
        <select name ="type" id="type">
            <option value="">Select Type</option>
            <option>Academic</option>
            <option>Lab</option>
            <option>Hostel</option>
            <option>Transport</option>
            <option>Classroom / Infrastructure</option>
        </select>
        <label>Location:</label><br>
         <input type="text" name ="location" id="loc" placeholder= "Ex: Kp,room no:102">
        <label>Complaint Description :</label>
         <textarea id="desc" name ="description" placeholder="Complete explanation of complaint"></textarea>
        <label>Attachment:</label><br>
        <small>File format: PDF,JPG,PNG (Max size:2MB)</small>
         <input type="file" name = "file" id ="file" accept=".pdf,.jpg,.png">
         <button type="submit">Submit</button><br><br>
    </form>
    <p id="output"></p>
         <button><a id ="ad" href="submit.html">Previous</a></button>
</div>

<script>
function saveComplaint() {
    let type = document.getElementById("type").value;
    let loc = document.getElementById("loc").value;
    let desc = document.getElementById("desc").value;
    let fileInput = document.getElementById("file");
    let file = fileInput.files[0];

    if (type === "" || loc === "" || desc === "") {
        alert("All fields are required!");
        return false;
    }

    let students = JSON.parse(localStorage.getItem("students")) || [];
    let lastStudent = students[students.length - 1];

    if (!lastStudent) {
        alert("No student data found! Fill student details first.");
        return false;
    }

    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

    let newComplaint = {
        id: Date.now(),
        name: lastStudent.name,
        email: lastStudent.email,
        type: type,
        location: loc,
        description: desc,
        fileName: file ? file.name : "No file",
        status: "Pending"
    };

    complaints.push(newComplaint);
    localStorage.setItem("complaints", JSON.stringify(complaints));

    document.getElementById("output").innerHTML =
        "✅ Complaint submitted!<br>Your Complaint ID: <b>" + newComplaint.id + "</b>";

    document.getElementById("type").value = "";
    document.getElementById("loc").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("file").value = "";

    return false;
}
</script>

</body>
</html>
