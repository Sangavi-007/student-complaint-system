<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Status</title>

    <style>
    body {
        font-family: Arial;
        background: #eef2f7;
        text-align: center;
    }
    .background{
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url("clg.jpeg") no-repeat center/cover;
        filter: blur(5px);  
        z-index: -1;
 }

    .box {
        width: 400px;
        margin: 80px auto;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
    }

    button {
        padding: 10px 20px;
        background: blue;
        color: white;
        border: none;
        cursor: pointer;
    }

    #result {
        margin-top: 15px;
        font-weight: bold;
    }
    </style>
</head>

<body>

<div class="box">
    <h2>Check Complaint Status</h2>

    <input type="text" id="search" placeholder="Enter Complaint ID">
    <button onclick="checkStatus()">Check</button>

    <div id="result"></div>
</div>

<script>
function checkStatus() {
    let id = document.getElementById("search").value;
    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

    if (id === "") {
        alert("Enter Complaint ID");
        return;
    }

    let found = complaints.find(c => c.id == id);

    if (found) {
        document.getElementById("result").innerHTML =
            "Name: " + found.name + "<br>" +
            "Type: " + found.type + "<br>" +
            "Location: " + found.location + "<br>" +
            "Status: <b>" + found.status + "</b>";
    } else {
        document.getElementById("result").innerHTML =
            "❌ Complaint not found";
    }
}
</script>

</body>
</html>
