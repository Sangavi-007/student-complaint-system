<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #eef2f7;
        }

        .navbar {
            background: #2575fc;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ccc;
            text-align: left;
        }

        select {
            padding: 5px;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background: #2575fc;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0052cc;
        }
    </style>
</head>

<body>

<div class="navbar">
    Admin Dashboard
</div>

<div class="container">

    <div class="card">
        <h3>Complaints List</h3>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Complaint</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="tableBody">
                <!-- Data will come from localStorage -->
            </tbody>
        </table>
    </div>

    <div class="card">
        <button onclick="logout()">Logout</button>
    </div>

</div>

<script>
function loadComplaints() {
    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];
    let table = document.getElementById("tableBody");

    table.innerHTML = "";

    complaints.forEach((c, index) => {
        let row = `
            <tr>
                <td>${c.id}</td>
                <td>${c.name}</td>
                <td>${c.complaint}</td>
                <td>
                    <select onchange="updateStatus(${index}, this.value)">
                        <option ${c.status === "Pending" ? "selected" : ""}>Pending</option>
                        <option ${c.status === "Resolved" ? "selected" : ""}>Resolved</option>
                    </select>
                </td>
            </tr>
        `;
        table.innerHTML += row;
    });
}

function updateStatus(index, newStatus) {
    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];
    complaints[index].status = newStatus;
    localStorage.setItem("complaints", JSON.stringify(complaints));
}

function logout() {
    alert("Logged out!");
    window.location.href = "login.html"; // change if needed
}

window.onload = loadComplaints;
</script>

</body>
</html>
