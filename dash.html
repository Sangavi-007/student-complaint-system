<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
<title>Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial;
    background: #eef2f7;
}

.navbar {
    background: linear-gradient(to right, #6a11cb, #2575fc);
    color: white;
    padding: 18px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.container {
    max-width: 1000px;
    margin: 30px auto;
    padding: 10px;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

h3 {
    margin-bottom: 15px;
}

select {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    border-radius: 10px;
    overflow: hidden;
}

th {
    background: #2575fc;
    color: white;
    padding: 12px;
    text-align: left;
}

td {
    padding: 12px;
    border-bottom: 1px solid #eee;
}

tr:nth-child(even) {
    background: #f9f9f9;
}

tr:hover {
    background: #f1f7ff;
}

/* status colors */
.pending {
    color: red;
    font-weight: bold;
}
.resolved {
    color: green;
    font-weight: bold;
}

</style>
</head>

<body>

<div class="navbar">Admin Dashboard</div>

<div class="container">

    <div class="card">
        <h3>Filter by Type</h3>
        <select onchange="filterType(this.value)">
            <option value="All">All</option>
            <option>Academic</option>
            <option>Classroom</option>
            <option>Hostel</option>
            <option>Transport</option>
            <option>Other</option>
        </select>
    </div>

    <div class="card">
        <h3>Complaints</h3>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Complaint</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<script>
let allComplaints = [];

function loadComplaints() {
    allComplaints = JSON.parse(localStorage.getItem("complaints")) || [];
    display(allComplaints);
}

function display(data) {
    let table = document.getElementById("tableBody");
    table.innerHTML = "";

    data.forEach((c) => {
        let statusClass = c.status === "Resolved" ? "resolved" : "pending";

        let row = `
        <tr>
            <td>${c.id}</td>
            <td>${c.name}</td>
            <td>${c.type || "-"}</td>
            <td>${c.description || "-"}</td>
            <td>
                <select onchange="updateStatus(${c.id}, this.value)" class="${statusClass}">
                    <option ${c.status==="Pending"?"selected":""}>Pending</option>
                    <option ${c.status==="Resolved"?"selected":""}>Resolved</option>
                </select>
            </td>
        </tr>`;
        table.innerHTML += row;
    });
}

function filterType(type) {
    if (type === "All") {
        display(allComplaints);
    } else {
        let filtered = allComplaints.filter(c => c.type === type);
        display(filtered);
    }
}

function updateStatus(id, status) {
    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

    complaints.forEach(c => {
        if (c.id == id) {
            c.status = status;
        }
    });

    localStorage.setItem("complaints", JSON.stringify(complaints));
    loadComplaints();
}

window.onload = loadComplaints;
</script>

</body>
</html>
