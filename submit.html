<!DOCTYPE html>
<html>
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial-scale = 1.0">
    <title>Submit Complaint</title>
    <style>
body {
    background: #eef2f7;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}
 .background{
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url("clg.jpeg") no-repeat center/cover;
        filter: blur(5px);  
        z-index: -1;
 }

.container {
    width: 350px;
    margin: auto;
    margin-top: 80px;
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}


input:focus, select:focus, textarea:focus {
    border-color: #007bff;
    outline: none;
}
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(to right, #0066ff, #00ccff);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: linear-gradient(to right, #0052cc, #00aaff);
}
    </style>
</head>
<body>
<div class = "background"></div>
<div class="container">
    <h2>Submit Complaint</h2>

    <form onsubmit="return validateForm()">
        <label>Register number :</label>
        <input type="number" id="regno" >

        <label>Department:</label><br>
        <select id="dept">
            <option value="">Select Department</option>
            <option>IST</option>
            <option>CSE</option>
            <option>ECE</option>
            <option>EEE</option>
            <option>Others</option>
        </select><br>

        <label>Complaint type:</label>
        <select id="type">
            <option value="">Select Type</option>
            <option>Academic</option>
            <option>Lab</option>
            <option>Hostel</option>
            <option>Transport</option>
            <option>Classroom / Infrastructure</option>
           
        </select>

        <textarea id="desc" placeholder="Enter your complaint" maxlength="50"></textarea>

        <button type="submit">Submit</button>
    </form>
</div>

<script>
function validateForm() {
    let name = document.getElementById("regno").value;
    let dept = document.getElementById("dept").value;
    let type = document.getElementById("type").value;
    let desc = document.getElementById("desc").value;

    if (name === "" || dept === "" || type === "" || desc === "") {
        alert("All fields are required!");
        return false;
    }

    alert("Complaint submitted successfully!");
    return true;
}
</script>

</body>
</html>
